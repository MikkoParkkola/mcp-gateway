# MCP Gateway Claude plugin bundle.
#
# The Claude plugin manifest exposes exactly one client-side MCP server:
# mcp-gateway. This bundle is the canonical curated backend roster loaded by
# that gateway process.

server:
  host: "127.0.0.1"
  port: 39400
  request_timeout: 30s
  shutdown_timeout: 30s

meta_mcp:
  enabled: true
  cache_tools: true
  cache_ttl: 5m

capabilities:
  enabled: true
  name: mcp-gateway-plugin
  directories:
    - ${CLAUDE_PLUGIN_ROOT}/capabilities

backends:
  filesystem:
    command: "npx -y @modelcontextprotocol/server-filesystem@2025.8.21 ${HOME}"
    description: "Pinned local filesystem MCP backend"
    enabled: true
  git:
    command: "npx -y @modelcontextprotocol/server-git@2025.8.21"
    description: "Pinned Git repository MCP backend"
    enabled: true
  github:
    command: "npx -y @modelcontextprotocol/server-github@2025.8.21"
    description: "Pinned GitHub MCP backend"
    enabled: true
  gitlab:
