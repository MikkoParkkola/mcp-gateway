apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-gateway-config
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/part-of: mcp-gateway-enterprise
    mcp-gateway.io/license-tier: enterprise
data:
  gateway.yaml: |
    server:
      host: 0.0.0.0
      port: 39400
    security:
      firewall:
        enabled: true
        scan_requests: true
        scan_responses: true
    backends: []
