apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gateway
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/part-of: mcp-gateway-enterprise
    mcp-gateway.io/license-tier: enterprise
spec:
  replicas: 2
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-gateway
        app.kubernetes.io/part-of: mcp-gateway-enterprise
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "39400"
    spec:
      serviceAccountName: mcp-gateway
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          image: ghcr.io/mikkoparkkola/mcp-gateway:latest
          imagePullPolicy: IfNotPresent
          args:
            - "serve"
            - "--config"
            - "/etc/mcp-gateway/gateway.yaml"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "39400"
          ports:
            - name: http
              containerPort: 39400
              protocol: TCP
          env:
            - name: MCP_GATEWAY_LOG_FORMAT
              value: "json"
            - name: MCP_GATEWAY_LOG_LEVEL
              value: "info"
          volumeMounts:
            - name: config
              mountPath: /etc/mcp-gateway
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: mcp-gateway-config
