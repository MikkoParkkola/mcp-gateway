name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  public-repo-hygiene:
    name: Public repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Validate public repo hygiene scripts
        run: bash -n scripts/dev/check-public-repo-hygiene.sh tests/public_repo_hygiene.sh
      - name: Validate public repo hygiene fixtures
        run: tests/public_repo_hygiene.sh
      - name: Validate tracked public docs boundary
        run: scripts/dev/check-public-repo-hygiene.sh

  service-template-smoke:
    name: Service template smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Validate service-template smoke script
        run: bash -n scripts/dev/service-template-smoke.sh
      - name: Validate single-node templates with generated config
        run: scripts/dev/service-template-smoke.sh

  usability-smoke:
    name: First-use usability smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Validate first-use smoke scripts
        run: bash -n scripts/dev/usability-smoke.sh scripts/dev/first-run-smoke.sh
      - name: Validate noninteractive setup and routed first call
        run: scripts/dev/usability-smoke.sh

  helm-chart-smoke:
    name: Helm chart lint + render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
      - name: Validate helm chart smoke script
        run: bash -n scripts/dev/helm-chart-smoke.sh
      - name: Lint, render, and schema-validate the chart
        run: scripts/dev/helm-chart-smoke.sh

  helm-oci-roundtrip:
    name: Helm OCI package/push/pull
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
      - name: Package, push to OCI, pull, and render the same artifact
        run: |
          set -euo pipefail
          out="$(mktemp -d)"
          helm package deploy/helm/mcp-gateway -d "$out"
          helm package deploy/helm/mcp-gateway-crds -d "$out"
          for tgz in "$out"/*.tgz; do
            helm push "$tgz" oci://localhost:5000/charts --plain-http
          done
          # Pull the app chart back and render the pulled artifact.
          ver="$(grep -E '^version:' deploy/helm/mcp-gateway/Chart.yaml | awk '{print $2}')"
          mkdir -p "$out/pulled"
          helm pull oci://localhost:5000/charts/mcp-gateway --version "$ver" -d "$out/pulled" --plain-http
          test -f "$out/pulled/mcp-gateway-$ver.tgz"
          helm template t "$out/pulled/mcp-gateway-$ver.tgz" | grep -q '^kind: Deployment'
          echo "OCI round-trip ok: pushed + pulled + rendered mcp-gateway $ver"

  helm-supply-chain:
    name: Helm supply chain (cosign + SBOM)
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
      - name: Install cosign
        # ponytail: floating major tag until pinned to a SHA (follow-up).
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.5.2
      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0
      - name: Validate supply-chain smoke script
        run: bash -n scripts/dev/helm-supply-chain-smoke.sh
      - name: Sign + verify chart and image by digest, assert SBOM
        run: scripts/dev/helm-supply-chain-smoke.sh

  helm-airgap:
    name: Helm air-gap export/import
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
      airgap:
        image: registry:2
        ports:
          - 5001:5000
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
      - name: Install cosign
        # ponytail: floating major tag until pinned to a SHA (follow-up).
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.5.2
      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0
      - name: Validate air-gap smoke script
        run: bash -n scripts/dev/helm-airgap-smoke.sh
      - name: Export to bundle, import to isolated registry, verify + install offline
        run: scripts/dev/helm-airgap-smoke.sh

  k8s-kind-rollback:
    name: K8s kind apply+upgrade+rollback
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate kind rollback smoke script
        run: bash -n deploy/kubernetes/enterprise-alpha/scripts/kind-rollback-smoke.sh
      - name: Create kind cluster
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v1.12.0
        with:
          cluster_name: mcp-gateway-rollback-smoke
      - name: Apply, upgrade, and roll back on the real cluster
        env:
          # kind-action already created the cluster and set the kube context;
          # the smoke reuses it (and must not delete it — the action owns teardown).
          MCP_GATEWAY_KIND_CLUSTER: mcp-gateway-rollback-smoke
          MCP_GATEWAY_KIND_KEEP: "1"
        run: deploy/kubernetes/enterprise-alpha/scripts/kind-rollback-smoke.sh
      - name: Validate helm kind lifecycle script
        run: bash -n scripts/dev/helm-kind-lifecycle.sh
      - name: Helm install, upgrade, and rollback on the real cluster
        env:
          MCP_GATEWAY_KIND_CLUSTER: mcp-gateway-rollback-smoke
          MCP_GATEWAY_KIND_KEEP: "1"
        run: scripts/dev/helm-kind-lifecycle.sh

  check:
    name: Clippy (pedantic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --all-features -- -D warnings

  windows-check:
    name: Windows check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo check --all-features

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --all-features

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install cargo-audit
        env:
          RUSTFLAGS: ""
        run: cargo install cargo-audit --locked
      - run: cargo audit

  kani:
    name: Kani
    # ubuntu-20.04 was retired by GitHub in April 2025. Jobs targeting it
    # queue forever waiting on a runner image that no longer exists, then
    # get auto-cancelled at the 24h workflow max — which is exactly what
    # was happening here on every run for ~3 days. Pin to ubuntu-22.04
    # (still on the runner-image LTS path) for reproducibility; latest
    # would also work but pinning matches Kani upstream's CI matrix.
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Strip rust-version for Kani toolchain compatibility
        # Kani 0.67.0 (the latest model-checking/kani-github-action @ v1.1
        # SHA pin) ships nightly rustc 1.93. The project's
        # rust-version=1.95 (commit f2063376) is a deployment-target
        # requirement, not a verification requirement. Cargo's
        # rust-version gate fires before kani runs, so we strip the
        # field for this job only. Re-enable when Kani upstream ships a
        # release with a 1.95-compatible nightly bundle.
        run: sed -i '/^rust-version = /d' Cargo.toml
      - name: Run Kani proofs
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          args: --output-format=terse

  public-claims:
    name: Public claims
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Validate README benchmark scenario script
        run: python3 benchmarks/token_savings.py --scenario readme --json
      - name: Validate public claim consistency
        run: cargo test --test public_claims_validation

  secrets-scan:
    name: Secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@c1a1d6a28a601e902d8652e75425c4b3d3294053 # main
        with:
          extra_args: --only-verified

  docker:
    name: Docker
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check, test, fmt, audit, public-claims, public-repo-hygiene, service-template-smoke, usability-smoke, helm-chart-smoke, helm-oci-roundtrip, helm-supply-chain, helm-airgap]
    permissions:
      contents: read
      packages: write
      id-token: write # keyless cosign signing (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract tag
        id: meta
        run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/mikkoparkkola/mcp-gateway:${{ steps.meta.outputs.version }}
            ghcr.io/mikkoparkkola/mcp-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        # ponytail: floating major tag until pinned to a SHA (follow-up); the
        # rest of this workflow is SHA-pinned per repo convention. cosign-release
        # is pinned so flag behavior can't drift under a v3 default.
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.5.2

      - name: Install syft (SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Cosign keyless-sign the released image by digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/mikkoparkkola/mcp-gateway@${DIGEST}"

      - name: Generate + attest an SBOM (SPDX JSON) for the released image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          syft "ghcr.io/mikkoparkkola/mcp-gateway@${DIGEST}" -o spdx-json > sbom.spdx.json
          test -s sbom.spdx.json
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson \
            "ghcr.io/mikkoparkkola/mcp-gateway@${DIGEST}"

      - name: Verify the release signature + SBOM attestation
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          # Exact signer identity: THIS workflow file at the pushed tag ref, so a
          # different workflow with OIDC cannot satisfy the check.
          IDENTITY: https://github.com/MikkoParkkola/mcp-gateway/.github/workflows/ci.yml@${{ github.ref }}
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-identity "${IDENTITY}" \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            "ghcr.io/mikkoparkkola/mcp-gateway@${DIGEST}"
          cosign verify-attestation --type spdxjson \
            --certificate-identity "${IDENTITY}" \
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
            "ghcr.io/mikkoparkkola/mcp-gateway@${DIGEST}"
