name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v2.0.1)'
        required: true

# Least-privilege default for all jobs (CodeQL actions/missing-workflow-permissions).
# Jobs needing more (release, publish, npm-publish) override locally.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Release backstop for the dependency-vulnerability gate. ci.yml runs
  # `cargo audit` on every PR/push (RustSec advisories); this re-scans the
  # Cargo.lock against OSV at tag time so a known fixable vuln cannot ship via
  # the release/publish path, which `cargo audit` does not currently gate. Every
  # publishing job below is transitively `needs:`-ed to `verify`, which
  # `needs:` this gate — so the GitHub release, crates.io publish, npm publish,
  # and Homebrew formula bump all block if a known fixable vuln is present.
  # Exceptions are time-boxed in .github/osv-scanner.toml.
  security-gate:
    name: Security gate (block release on known vulns)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Scan Rust dependencies against OSV
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --config=.github/osv-scanner.toml
            --recursive
            ./

  # Second release backstop, alongside security-gate: the semantic CWE-532
  # leak lint (ci.yml's secret-leak-lint job re-implemented as a dependency
  # here rather than a cross-workflow needs:, since GitHub Actions has no
  # native "wait for a different workflow on the same ref" primitive short
  # of workflow_run, which would desync from this workflow's own tag
  # trigger). Same script, same baseline file — see scripts/dev/
  # cwe532-leak-lint.py and scripts/dev/cwe532-baseline.txt.
  #
  # NOTE (manual release-checklist item, not automated here): before tagging
  # a release, also check for open P0/P1 security tickets in the tracker —
  # this gate only catches what static analysis can see, not triaged/known
  # issues awaiting a fix.
  #
  # NOTE: this repo has no CodeQL workflow as of this gate's introduction
  # (verified: no `.github/workflows/*codeql*` and no
  # `github/codeql-action/analyze` step anywhere in .github/workflows/).
  # If CodeQL is added later, wire it into this same needs: chain.
  secret-leak-lint:
    name: Secret-leak lint (CWE-532)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Test the leak-lint parser (fail on parser regression)
        run: python3 scripts/dev/test_cwe532_leak_lint.py
      - name: Run CWE-532 leak lint
        run: python3 scripts/dev/cwe532-leak-lint.py src crates

  verify:
    needs: [security-gate, secret-leak-lint]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Verify publish package
        run: cargo publish --locked --dry-run

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: mcp-gateway-linux-x86_64
            suffix: ""
            packages: musl-tools
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: mcp-gateway-linux-aarch64
            suffix: ""
            packages: musl-tools gcc-aarch64-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mcp-gateway-darwin-arm64
            suffix: ""
            packages: ""
          - os: macos-15
            target: x86_64-apple-darwin
            artifact: mcp-gateway-darwin-x86_64
            suffix: ""
            packages: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mcp-gateway-windows-x86_64
            suffix: .exe
            packages: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install system packages
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/mcp-gateway${{ matrix.suffix }} ${{ matrix.artifact }}${{ matrix.suffix }}
          if [ "${{ matrix.suffix }}" = "" ]; then
            chmod +x ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name 'mcp-gateway-*' -exec cp {} release/ \;
          # Bundle license/notice text with every published binary (counsel #7:
          # each artifact must carry its own license, not just the repo).
          cp LICENSE LICENSE-MIT LICENSE-NONCOMMERCIAL LICENSES.md NOTICE.md COMMERCIAL.md release/
          ls -la release/

      - name: Create checksums
        run: |
          cd release
          sha256sum -- * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: MCP Gateway ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## Installation

            ### Cargo (Recommended)
            ```bash
            cargo install mcp-gateway
            ```

            ### Manual Download
            Download the appropriate binary for your platform from the assets below.

            **Supported platforms:**
            - `mcp-gateway-darwin-arm64` - macOS Apple Silicon (M1/M2/M3)
            - `mcp-gateway-darwin-x86_64` - macOS Intel
            - `mcp-gateway-linux-x86_64` - Linux x86_64 (static musl)
            - `mcp-gateway-linux-aarch64` - Linux ARM64 (static musl)
            - `mcp-gateway-windows-x86_64.exe` - Windows x86_64 (MSVC)

            ## Verify checksums
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ## Quick Start
            ```bash
            # Create config file
            cat > servers.yaml << 'EOF'
            server:
              port: 39400
            meta_mcp:
              enabled: true
            backends: {}
            EOF

            # Start gateway
            mcp-gateway --config servers.yaml
            ```

            See [README](https://github.com/MikkoParkkola/mcp-gateway#readme) for full documentation.
          files: |
            release/*
          draft: false
          prerelease: false

  publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write     # OIDC for npm trusted publishing + provenance attestation
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Node 22 bundles npm 10.x; OIDC trusted publishing requires npm >= 11.5.1,
      # and current npm@latest (12.x) requires Node >= 22.22.2, so pin Node 22.
      - name: Upgrade npm CLI for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Sync npm package version to git tag
        working-directory: npm
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Setting npm version to ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Publish to npm (OIDC trusted publishing + provenance)
        working-directory: npm
        # Trusted publisher is configured on npmjs.com for
        # @mikkoparkkola/mcp-gateway against this workflow. npm CLI auto-detects
        # OIDC via id-token:write — no NODE_AUTH_TOKEN required.
        run: npm publish --access public --provenance

  homebrew-update:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Compute version and download checksums
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          curl --fail --location --silent --show-error \
            "https://github.com/MikkoParkkola/mcp-gateway/releases/download/${TAG}/SHA256SUMS.txt" \
            -o SHA256SUMS.txt
          cat SHA256SUMS.txt

          extract_sha() {
            grep " $1$" SHA256SUMS.txt | awk '{print $1}'
          }
          {
            echo "sha_darwin_arm64=$(extract_sha mcp-gateway-darwin-arm64)"
            echo "sha_darwin_x86_64=$(extract_sha mcp-gateway-darwin-x86_64)"
            echo "sha_linux_aarch64=$(extract_sha mcp-gateway-linux-aarch64)"
            echo "sha_linux_x86_64=$(extract_sha mcp-gateway-linux-x86_64)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: MikkoParkkola/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: homebrew-tap

      - name: Rewrite formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
          SHA_DARWIN_ARM64: ${{ steps.meta.outputs.sha_darwin_arm64 }}
          SHA_DARWIN_X86_64: ${{ steps.meta.outputs.sha_darwin_x86_64 }}
          SHA_LINUX_AARCH64: ${{ steps.meta.outputs.sha_linux_aarch64 }}
          SHA_LINUX_X86_64: ${{ steps.meta.outputs.sha_linux_x86_64 }}
        run: |
          for sha in "$SHA_DARWIN_ARM64" "$SHA_DARWIN_X86_64" "$SHA_LINUX_AARCH64" "$SHA_LINUX_X86_64"; do
            if [ -z "$sha" ]; then
              echo "Missing SHA256 for one of the release assets" >&2
              exit 1
            fi
          done

          cat > homebrew-tap/Formula/mcp-gateway.rb <<EOF
          class McpGateway < Formula
            desc "Universal MCP gateway — single port for all your MCP servers, ~95% token savings"
            homepage "https://github.com/MikkoParkkola/mcp-gateway"
            version "${VERSION}"
            # Mixed, per-file licensing (PolyForm-Noncommercial default + MIT core);
            # SPDX can't express it. See LICENSES.md / COMMERCIAL.md.
            license :cannot_represent

            on_macos do
              on_arm do
                url "https://github.com/MikkoParkkola/mcp-gateway/releases/download/${TAG}/mcp-gateway-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/MikkoParkkola/mcp-gateway/releases/download/${TAG}/mcp-gateway-darwin-x86_64"
                sha256 "${SHA_DARWIN_X86_64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/MikkoParkkola/mcp-gateway/releases/download/${TAG}/mcp-gateway-linux-aarch64"
                sha256 "${SHA_LINUX_AARCH64}"
              end
              on_intel do
                url "https://github.com/MikkoParkkola/mcp-gateway/releases/download/${TAG}/mcp-gateway-linux-x86_64"
                sha256 "${SHA_LINUX_X86_64}"
              end
            end

            def install
              if OS.mac?
                if Hardware::CPU.arm?
                  bin.install "mcp-gateway-darwin-arm64" => "mcp-gateway"
                else
                  bin.install "mcp-gateway-darwin-x86_64" => "mcp-gateway"
                end
              elsif OS.linux?
                if Hardware::CPU.arm?
                  bin.install "mcp-gateway-linux-aarch64" => "mcp-gateway"
                else
                  bin.install "mcp-gateway-linux-x86_64" => "mcp-gateway"
                end
              end
            end

            def post_install
              system "xattr", "-dr", "com.apple.quarantine", "#{bin}/mcp-gateway" if OS.mac?
            rescue
              nil
            end

            def caveats
              <<~CAVEATS
                Licensing: mcp-gateway uses mixed, per-file licensing; the runnable
                gateway is PolyForm Noncommercial 1.0.0. Commercial use requires a
                license. See https://github.com/MikkoParkkola/mcp-gateway/blob/main/COMMERCIAL.md
              CAVEATS
            end

            test do
              assert_match version.to_s, shell_output("#{bin/"mcp-gateway"} --version")
            end
          end
          EOF

          echo "--- Updated formula ---"
          cat homebrew-tap/Formula/mcp-gateway.rb

      - name: Commit and push formula bump
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/mcp-gateway.rb; then
            echo "Formula already up to date at v${VERSION}"
            exit 0
          fi
          git add Formula/mcp-gateway.rb
          git commit -m "mcp-gateway ${VERSION}"
          git push
