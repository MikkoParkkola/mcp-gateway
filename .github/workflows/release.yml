name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g., v2.0.1)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

      - name: Verify publish package
        run: cargo publish --locked --dry-run

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: mcp-gateway-linux-x86_64
            suffix: ""
            packages: musl-tools
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            artifact: mcp-gateway-linux-aarch64
            suffix: ""
            packages: musl-tools gcc-aarch64-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mcp-gateway-darwin-arm64
            suffix: ""
            packages: ""
          - os: macos-15
            target: x86_64-apple-darwin
            artifact: mcp-gateway-darwin-x86_64
            suffix: ""
            packages: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mcp-gateway-windows-x86_64
            suffix: .exe
            packages: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install system packages
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/mcp-gateway${{ matrix.suffix }} ${{ matrix.artifact }}${{ matrix.suffix }}
          if [ "${{ matrix.suffix }}" = "" ]; then
            chmod +x ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.suffix }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f -name 'mcp-gateway-*' -exec cp {} release/ \;
          ls -la release/

      - name: Create checksums
        run: |
          cd release
          sha256sum -- * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: MCP Gateway ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            ## Installation

            ### Cargo (Recommended)
            ```bash
            cargo install mcp-gateway
            ```

            ### Manual Download
            Download the appropriate binary for your platform from the assets below.

            **Supported platforms:**
            - `mcp-gateway-darwin-arm64` - macOS Apple Silicon (M1/M2/M3)
            - `mcp-gateway-darwin-x86_64` - macOS Intel
            - `mcp-gateway-linux-x86_64` - Linux x86_64 (static musl)
            - `mcp-gateway-linux-aarch64` - Linux ARM64 (static musl)
            - `mcp-gateway-windows-x86_64.exe` - Windows x86_64 (MSVC)

            ## Verify checksums
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ## Quick Start
            ```bash
            # Create config file
            cat > servers.yaml << 'EOF'
            server:
              port: 39400
            meta_mcp:
              enabled: true
            backends: {}
            EOF

            # Start gateway
            mcp-gateway --config servers.yaml
            ```

            See [README](https://github.com/MikkoParkkola/mcp-gateway#readme) for full documentation.
          files: |
            release/*
          draft: false
          prerelease: false

  publish:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  npm-publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write     # OIDC for npm trusted publishing + provenance attestation
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v6.0.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Sync npm package version to git tag
        working-directory: npm
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Setting npm version to ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

      - name: Publish to npm (OIDC trusted publishing + provenance)
        working-directory: npm
        # npm CLI auto-detects OIDC when id-token:write is granted and a trusted
        # publisher is configured on npmjs.com for @mikkoparkkola/mcp-gateway.
        # NODE_AUTH_TOKEN remains as fallback until trusted publishing is enabled.
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  homebrew-update:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Compute version and download checksums
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          curl --fail --location --silent --show-error \
            "https://github.com/MikkoParkkola/mcp-gateway/releases/download/${TAG}/SHA256SUMS.txt" \
            -o SHA256SUMS.txt
          cat SHA256SUMS.txt

          extract_sha() {
            grep " $1$" SHA256SUMS.txt | awk '{print $1}'
          }
          {
            echo "sha_darwin_arm64=$(extract_sha mcp-gateway-darwin-arm64)"
            echo "sha_darwin_x86_64=$(extract_sha mcp-gateway-darwin-x86_64)"
            echo "sha_linux_aarch64=$(extract_sha mcp-gateway-linux-aarch64)"
            echo "sha_linux_x86_64=$(extract_sha mcp-gateway-linux-x86_64)"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: MikkoParkkola/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: homebrew-tap

      - name: Rewrite formula
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          TAG: ${{ steps.meta.outputs.tag }}
          SHA_DARWIN_ARM64: ${{ steps.meta.outputs.sha_darwin_arm64 }}
          SHA_DARWIN_X86_64: ${{ steps.meta.outputs.sha_darwin_x86_64 }}
          SHA_LINUX_AARCH64: ${{ steps.meta.outputs.sha_linux_aarch64 }}
          SHA_LINUX_X86_64: ${{ steps.meta.outputs.sha_linux_x86_64 }}
        run: |
          for sha in "$SHA_DARWIN_ARM64" "$SHA_DARWIN_X86_64" "$SHA_LINUX_AARCH64" "$SHA_LINUX_X86_64"; do
            if [ -z "$sha" ]; then
              echo "Missing SHA256 for one of the release assets" >&2
              exit 1
            fi
          done

          cat > homebrew-tap/Formula/mcp-gateway.rb <<EOF
          class McpGateway < Formula
            desc "Universal MCP gateway — single port for all your MCP servers, ~95% token savings"
            homepage "https://github.com/MikkoParkkola/mcp-gateway"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/MikkoParkkola/mcp-gateway/releases/download/${TAG}/mcp-gateway-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/MikkoParkkola/mcp-gateway/releases/download/${TAG}/mcp-gateway-darwin-x86_64"
                sha256 "${SHA_DARWIN_X86_64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/MikkoParkkola/mcp-gateway/releases/download/${TAG}/mcp-gateway-linux-aarch64"
                sha256 "${SHA_LINUX_AARCH64}"
              end
              on_intel do
                url "https://github.com/MikkoParkkola/mcp-gateway/releases/download/${TAG}/mcp-gateway-linux-x86_64"
                sha256 "${SHA_LINUX_X86_64}"
              end
            end

            def install
              if OS.mac?
                if Hardware::CPU.arm?
                  bin.install "mcp-gateway-darwin-arm64" => "mcp-gateway"
                else
                  bin.install "mcp-gateway-darwin-x86_64" => "mcp-gateway"
                end
              elsif OS.linux?
                if Hardware::CPU.arm?
                  bin.install "mcp-gateway-linux-aarch64" => "mcp-gateway"
                else
                  bin.install "mcp-gateway-linux-x86_64" => "mcp-gateway"
                end
              end
            end

            def post_install
              system "xattr", "-dr", "com.apple.quarantine", "#{bin}/mcp-gateway" if OS.mac?
            rescue
              nil
            end

            test do
              assert_match version.to_s, shell_output("#{bin/"mcp-gateway"} --version")
            end
          end
          EOF

          echo "--- Updated formula ---"
          cat homebrew-tap/Formula/mcp-gateway.rb

      - name: Commit and push formula bump
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Formula/mcp-gateway.rb; then
            echo "Formula already up to date at v${VERSION}"
            exit 0
          fi
          git add Formula/mcp-gateway.rb
          git commit -m "mcp-gateway ${VERSION}"
          git push
