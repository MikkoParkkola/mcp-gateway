# Enterprise Edition — mcp-gateway Kubernetes CRDs
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcpservers.mcp-gateway.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: mcp-gateway.io
  names:
    kind: MCPServer
    listKind: MCPServerList
    plural: mcpservers
    singular: mcpserver
    shortNames:
      - mcps
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: MCPServer defines an MCP backend to be proxied by the Gateway — Enterprise Edition
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - endpoint
              properties:
                endpoint:
                  type: string
                  description: The upstream MCP server endpoint URL.
                protocol:
                  type: string
                  enum: [sse, streamable-http, stdio]
                  default: streamable-http
                gatewayRef:
                  type: object
                  description: Reference to the Gateway that routes to this server.
                  properties:
                    name:
                      type: string
                auth:
                  type: object
                  description: Authentication configuration for the upstream server.
                  properties:
                    secretRef:
                      type: object
                      description: Reference to a Kubernetes Secret for authentication credentials.
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                    type:
                      type: string
                      enum: [bearer, api-key, basic, oauth2]
                healthCheck:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: true
                    intervalSeconds:
                      type: integer
                      default: 30
                    path:
                      type: string
                      default: /health
                tools:
                  type: array
                  description: Explicit tool allowlist for this server.
                  items:
                    type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: "Condition type: Ready, DriftDetected, PolicyAccepted, PolicyViolation"
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      additionalPrinterColumns:
        - name: Endpoint
          type: string
          jsonPath: .spec.endpoint
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
