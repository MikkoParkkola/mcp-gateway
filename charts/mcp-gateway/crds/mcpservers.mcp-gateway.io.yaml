apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcpservers.mcp-gateway.io
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/part-of: mcp-gateway
    app.kubernetes.io/managed-by: mcp-gateway-operator
spec:
  group: mcp-gateway.io
  names:
    kind: MCPServer
    listKind: MCPServerList
    plural: mcpservers
    singular: mcpserver
    shortNames:
      - mcps
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - transport
              properties:
                transport:
                  type: string
                  enum:
                    - stdio
                    - sse
                    - streamable-http
                command:
                  type: string
                args:
                  type: array
                  items:
                    type: string
                url:
                  type: string
                env:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                      valueFrom:
                        type: object
                        properties:
                          secretKeyRef:
                            type: object
                            required:
                              - name
                              - key
                            properties:
                              name:
                                type: string
                              key:
                                type: string
                headers:
                  type: object
                  additionalProperties:
                    type: string
                timeout:
                  type: string
                  default: "30s"
                gatewayRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                        enum:
                          - Ready
                          - DriftDetected
                          - PolicyAccepted
                          - PolicyViolation
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                observedGeneration:
                  type: integer
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: Transport
          type: string
          jsonPath: .spec.transport
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
