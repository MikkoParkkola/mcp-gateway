# Enterprise Edition — mcp-gateway Kubernetes CRDs
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: runtimeprofiles.mcp-gateway.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: mcp-gateway.io
  names:
    kind: RuntimeProfile
    listKind: RuntimeProfileList
    plural: runtimeprofiles
    singular: runtimeprofile
    shortNames:
      - rp
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: RuntimeProfile defines resource limits, feature flags, and runtime tuning for a Gateway — Enterprise Edition
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                gatewayRef:
                  type: object
                  description: Reference to the Gateway this runtime profile applies to.
                  properties:
                    name:
                      type: string
                resources:
                  type: object
                  description: Resource requests and limits for gateway pods.
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                featureFlags:
                  type: object
                  description: Feature flag overrides for the gateway runtime.
                  x-kubernetes-preserve-unknown-fields: true
                tuning:
                  type: object
                  description: Runtime tuning parameters.
                  properties:
                    maxConcurrentRequests:
                      type: integer
                    requestTimeoutSeconds:
                      type: integer
                    connectionPoolSize:
                      type: integer
                secretRefs:
                  type: array
                  description: References to Kubernetes Secrets for runtime configuration.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      key:
                        type: string
                      envVar:
                        type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: "Condition type: Ready, DriftDetected, PolicyAccepted, PolicyViolation"
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
