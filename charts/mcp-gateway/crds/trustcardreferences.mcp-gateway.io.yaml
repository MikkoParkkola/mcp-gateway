apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: trustcardreferences.mcp-gateway.io
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/part-of: mcp-gateway
    app.kubernetes.io/managed-by: mcp-gateway-operator
spec:
  group: mcp-gateway.io
  names:
    kind: TrustCardReference
    listKind: TrustCardReferenceList
    plural: trustcardreferences
    singular: trustcardreference
    shortNames:
      - tcr
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - trustDomain
                - trustCard
              properties:
                trustDomain:
                  type: string
                  description: Trust domain identifier
                trustCard:
                  type: string
                  description: Trust card content (JSON or YAML)
                signature:
                  type: string
                  description: Cryptographic signature of the trust card
                gatewayRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                        enum:
                          - Ready
                          - DriftDetected
                          - PolicyAccepted
                          - PolicyViolation
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                observedGeneration:
                  type: integer
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: TrustDomain
          type: string
          jsonPath: .spec.trustDomain
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
