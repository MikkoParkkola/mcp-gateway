# Enterprise Edition — mcp-gateway Kubernetes CRDs
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gateways.mcp-gateway.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: mcp-gateway.io
  names:
    kind: Gateway
    listKind: GatewayList
    plural: gateways
    singular: gateway
    shortNames:
      - gw
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: Gateway is the Schema for the gateways API — Enterprise Edition
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                replicaCount:
                  type: integer
                  minimum: 1
                  default: 1
                  description: Number of gateway replicas. Set >= 2 for HA.
                image:
                  type: object
                  properties:
                    repository:
                      type: string
                      default: "ghcr.io/mikkoparkkola/mcp-gateway"
                    tag:
                      type: string
                    pullPolicy:
                      type: string
                      enum: [Always, IfNotPresent, Never]
                      default: IfNotPresent
                config:
                  type: object
                  description: Inline gateway configuration (non-secret values).
                  x-kubernetes-preserve-unknown-fields: true
                configRef:
                  type: object
                  description: Reference to a ConfigMap containing gateway configuration.
                  properties:
                    name:
                      type: string
                secretRefs:
                  type: array
                  description: References to Kubernetes Secrets for API keys and tokens.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Name of the Kubernetes Secret.
                      key:
                        type: string
                        description: Key within the Secret.
                      envVar:
                        type: string
                        description: Environment variable to inject.
                service:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [ClusterIP, NodePort, LoadBalancer]
                      default: ClusterIP
                    port:
                      type: integer
                      default: 39400
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                    limits:
                      type: object
                      properties:
                        cpu:
                          type: string
                        memory:
                          type: string
                networkPolicy:
                  type: object
                  description: NetworkPolicy rules for the gateway pods.
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    ingress:
                      type: array
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    egress:
                      type: array
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                metrics:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    serviceMonitor:
                      type: boolean
                      default: false
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                  description: The generation last reconciled by the operator.
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: "Condition type: Ready, DriftDetected, PolicyAccepted, PolicyViolation"
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
