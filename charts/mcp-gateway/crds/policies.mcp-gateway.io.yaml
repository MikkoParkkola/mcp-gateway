# Enterprise Edition — mcp-gateway Kubernetes CRDs
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: policies.mcp-gateway.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: mcp-gateway.io
  names:
    kind: Policy
    listKind: PolicyList
    plural: policies
    singular: policy
    shortNames:
      - pol
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          description: Policy defines governance rules for MCP tool access and data flow — Enterprise Edition
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                gatewayRef:
                  type: object
                  description: Reference to the Gateway this policy applies to.
                  properties:
                    name:
                      type: string
                rules:
                  type: array
                  description: Ordered list of policy rules evaluated top-to-bottom.
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      action:
                        type: string
                        enum: [allow, deny, redact, audit]
                      match:
                        type: object
                        properties:
                          tools:
                            type: array
                            items:
                              type: string
                          servers:
                            type: array
                            items:
                              type: string
                          callers:
                            type: array
                            items:
                              type: string
                enforcement:
                  type: string
                  enum: [strict, advisory]
                  default: strict
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                        description: "Condition type: Ready, PolicyAccepted, PolicyViolation"
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
      additionalPrinterColumns:
        - name: Enforcement
          type: string
          jsonPath: .spec.enforcement
        - name: Accepted
          type: string
          jsonPath: .status.conditions[?(@.type=="PolicyAccepted")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
