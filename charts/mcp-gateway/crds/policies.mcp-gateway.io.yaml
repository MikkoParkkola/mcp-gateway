apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: policies.mcp-gateway.io
  labels:
    app.kubernetes.io/name: mcp-gateway
    app.kubernetes.io/part-of: mcp-gateway
    app.kubernetes.io/managed-by: mcp-gateway-operator
spec:
  group: mcp-gateway.io
  names:
    kind: Policy
    listKind: PolicyList
    plural: policies
    singular: policy
    shortNames:
      - pol
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - rules
              properties:
                rules:
                  type: array
                  items:
                    type: object
                    required:
                      - name
                      - action
                    properties:
                      name:
                        type: string
                      description:
                        type: string
                      action:
                        type: string
                        enum:
                          - allow
                          - deny
                          - audit
                      match:
                        type: object
                        properties:
                          tools:
                            type: array
                            items:
                              type: string
                          backends:
                            type: array
                            items:
                              type: string
                          methods:
                            type: array
                            items:
                              type: string
                      conditions:
                        type: array
                        items:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                gatewayRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                        enum:
                          - Ready
                          - DriftDetected
                          - PolicyAccepted
                          - PolicyViolation
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                        format: date-time
                observedGeneration:
                  type: integer
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=='Ready')].status
        - name: PolicyAccepted
          type: string
          jsonPath: .status.conditions[?(@.type=='PolicyAccepted')].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
