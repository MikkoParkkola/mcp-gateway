# Enterprise Edition — mcp-gateway ServiceAccount and RBAC
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mcp-gateway.serviceAccountName" . }}
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-role
rules:
  - apiGroups: ["mcp-gateway.io"]
    resources: ["gateways", "mcpservers", "policies", "trustcardreferences", "runtimeprofiles"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["mcp-gateway.io"]
    resources: ["gateways/status", "mcpservers/status", "policies/status"]
    verbs: ["patch", "update"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mcp-gateway.fullname" . }}-role
subjects:
  - kind: ServiceAccount
    name: {{ include "mcp-gateway.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
