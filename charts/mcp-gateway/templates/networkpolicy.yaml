# Enterprise Edition — mcp-gateway NetworkPolicy
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "mcp-gateway.fullname" . }}-netpol
  labels:
    {{- include "mcp-gateway.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "mcp-gateway.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
        - podSelector:
            matchLabels:
              {{- include "mcp-gateway.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 39400
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
{{- end }}
