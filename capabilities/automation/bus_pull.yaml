fulcrum: "1.0"
name: bus_pull
description: >
  Agent Bus — poll for messages on a topic since a cursor timestamp.
  Pass the subscription_id returned by bus_subscribe as since_ts.
  Returns up to max_msgs messages in ascending ts order.
  Re-call with the ts of the last returned message to advance the cursor.
  [keywords: agent, bus, pull, poll, receive, message, inter-agent]

schema:
  input:
    type: object
    properties:
      topic_pattern:
        type: string
        description: "Topic prefix, e.g. bus.global or bus.proj.botnaut. Use % for wildcard SQL LIKE."
      since_ts:
        type: string
        description: "ISO-8601 cursor timestamp from bus_subscribe or last bus_pull"
      agent_id:
        type: string
        description: "Optional: also return DMs addressed to this agent id"
      max_msgs:
        type: integer
        description: "Max messages to return (1-100)"
        default: 20
    required:
      - topic_pattern
      - since_ts
  output:
    type: object
    properties:
      result:
        type: array
        description: "Array of bus_msg records"
      status:
        type: string

providers:
  primary:
    service: rest
    cost_per_call: 0
    timeout: 5
    config:
      endpoint: http://127.0.0.1:8000/sql
      method: POST
      headers:
        Surreal-Ns: agent_bus
        Surreal-Db: prod
        Accept: application/json
        Authorization: "Basic cm9vdDpyb290"
      body_content_type: text/plain
      # topic_pattern uses SurrealQL string::startsWith for prefix match.
      # since_ts is an ISO-8601 string cast to datetime.
      body: "SELECT * FROM bus_msg WHERE string::starts_with(topic, '{topic_pattern}') AND ts > <datetime>'{since_ts}' ORDER BY ts ASC LIMIT {max_msgs};"

auth:
  required: false

cache:
  strategy: none

metadata:
  category: automation
  tags:
    - agent
    - bus
    - pull
    - poll
    - receive
    - message
    - inter-agent
    - surrealdb
  cost_category: free
  execution_time: fast
  read_only: true
  docs: /tmp/c-agent-bus-design.md
